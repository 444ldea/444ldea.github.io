<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 470" role="img" aria-label="Metodología: del entorno controlado a la confirmación" font-family="ui-monospace, monospace">
  <defs>
    <marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#8b949e" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>
  <style>
    .box{fill:#1a2029;stroke:#2a323d;stroke-width:1;}
    .box-hit{fill:#2a1416;stroke:#e5534b;stroke-width:1.2;}
    .box-end{fill:#10231f;stroke:#2bb1a0;stroke-width:1;}
    .t{fill:#d7dce2;font-size:14px;font-weight:500;}
    .s{fill:#8b949e;font-size:12px;}
    .n{fill:#e3a008;font-size:12px;}
  </style>

  <rect class="box" x="190" y="30" width="300" height="50" rx="8"/>
  <text class="n" x="206" y="52">01</text><text class="t" x="232" y="52">Hipótesis</text>
  <text class="s" x="232" y="69">sospecha sobre XuperTV</text>
  <line x1="340" y1="80" x2="340" y2="106" stroke="#8b949e" stroke-width="1.5" marker-end="url(#arr)"/>

  <rect class="box" x="190" y="110" width="300" height="50" rx="8"/>
  <text class="n" x="206" y="132">02</text><text class="t" x="232" y="132">Diseño del entorno</text>
  <text class="s" x="232" y="149">D-Link DGS-1100 + VLAN dedicada</text>
  <line x1="340" y1="160" x2="340" y2="186" stroke="#8b949e" stroke-width="1.5" marker-end="url(#arr)"/>

  <rect class="box" x="190" y="190" width="300" height="50" rx="8"/>
  <text class="n" x="206" y="212">03</text><text class="t" x="232" y="212">Instalación controlada</text>
  <text class="s" x="232" y="229">XuperTV en segmento aislado</text>
  <line x1="340" y1="240" x2="340" y2="266" stroke="#8b949e" stroke-width="1.5" marker-end="url(#arr)"/>

  <rect class="box" x="190" y="270" width="300" height="50" rx="8"/>
  <text class="n" x="206" y="292">04</text><text class="t" x="232" y="292">Captura y análisis</text>
  <text class="s" x="232" y="309">packet capture + análisis DNS / SNI</text>
  <line x1="340" y1="320" x2="340" y2="346" stroke="#8b949e" stroke-width="1.5" marker-end="url(#arr)"/>

  <rect class="box-hit" x="190" y="350" width="300" height="50" rx="8"/>
  <text class="n" x="206" y="372">05</text><text class="t" x="232" y="372" fill="#f0959a">Confirmación del patrón</text>
  <text class="s" x="232" y="389" fill="#cf9499">beaconing 20s + dominios DGA</text>
  <line x1="340" y1="400" x2="340" y2="426" stroke="#8b949e" stroke-width="1.5" marker-end="url(#arr)"/>

  <rect class="box-end" x="190" y="430" width="300" height="36" rx="8"/>
  <text class="n" x="206" y="452">06</text><text class="t" x="232" y="452" fill="#5fd3c4">Cierre del experimento (factory reset)</text>
</svg>
