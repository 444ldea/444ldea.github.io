  description = "Portafolio"
  # Edita estos enlaces:
  github = "https://github.com/444ldea"
  linkedin = "https://linkedin.com/in/felipe-aldea"
  email = "aldeatorres.f@gmail.com"
  cvFile = "/files/cv.pdf"   # coloca tu CV en static/files/cv.pdf

